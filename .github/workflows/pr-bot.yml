name: PR Bot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  assign-reviewer:
    name: Auto Assign Reviewer
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Assign reviewer from CODEOWNERS
        uses: kentaro-m/auto-assign-action@v2.0.0
        with:
          configuration-path: .github/auto_assign.yml

  comment:
    name: PR Summary Comment
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          separator: "\n"

      - name: Count changed crates
        id: crates
        run: |
          crates=$(echo "${{ steps.changed.outputs.all_changed_files }}" \
            | grep -oP 'crates/[^/]+' | sort -u | tr '\n' ', ' | sed 's/,$//')
          echo "list=${crates:-none}" >> "$GITHUB_OUTPUT"

      - name: Post PR summary comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## PR Check Summary

            | Item | Value |
            |------|-------|
            | Branch | `${{ github.head_ref }}` |
            | Changed crates | `${{ steps.crates.outputs.list }}` |
            | Files changed | ${{ steps.changed.outputs.all_changed_files_count }} |

            CI will run: **build**, **test**, **clippy**, **fmt**, **cargo-deny**.
            Reviewer assigned from CODEOWNERS (`@mohu-org/core`).
